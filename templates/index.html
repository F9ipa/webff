<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الرحلات - تصميم فيليكس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .gradient-header { background: linear-gradient(90deg, #1e3a8a, #3b82f6); }
    </style>
</head>
<body class="p-4">

    <div class="gradient-header text-white p-6 rounded-2xl mb-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">لوحة تحليل الرحلات التشغيلية</h1>
        <p class="text-sm opacity-80">تصميم فيليكس | مطار الملك عبدالعزيز الدولي</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="stats-container">
        <div class="card p-4 text-center border-r-4 border-blue-500">
            <p class="text-gray-500 text-sm">إجمالي الرحلات</p>
            <h2 id="total-flights" class="text-3xl font-bold text-blue-900">-</h2>
        </div>
        <div class="card p-4 text-center border-r-4 border-green-500">
            <p class="text-gray-500 text-sm">إجمالي الركاب المتوقع</p>
            <h2 id="total-pax" class="text-3xl font-bold text-green-700">-</h2>
        </div>
        <div class="card p-4 text-center border-r-4 border-orange-500">
            <p class="text-gray-500 text-sm">احتياج الكاونترات</p>
            <h2 id="counter-need" class="text-3xl font-bold text-orange-600">-</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card p-4">
            <h3 class="font-bold mb-4 text-red-600 border-b pb-2 italic">⚠️ الفجوات التشغيلية (أكثر من 15 دقيقة)</h3>
            <div id="gaps-list" class="space-y-2 overflow-y-auto max-h-[400px]">
                </div>
        </div>

        <div class="card p-4">
            <h3 class="font-bold mb-4 text-blue-800 border-b pb-2">📅 قائمة الرحلات القادمة</h3>
            <div id="flights-list" class="space-y-2 overflow-y-auto max-h-[400px]">
                </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/flights');
                const data = await response.json();
                
                if (data.error) {
                    alert('خطأ في تحميل البيانات: ' + data.error);
                    return;
                }

                // تحديث الإحصائيات
                document.getElementById('total-flights').innerText = data.analysis.total_flights;
                document.getElementById('total-pax').innerText = data.analysis.total_pax.toLocaleString();
                document.getElementById('counter-need').innerText = data.analysis.counter_need;

                // تحديث الفجوات
                const gapsContainer = document.getElementById('gaps-list');
                gapsContainer.innerHTML = '';
                data.analysis.gaps.forEach(gap => {
                    gapsContainer.innerHTML += `
                        <div class="bg-red-50 p-3 rounded-lg border border-red-200 flex justify-between items-center">
                            <div>
                                <span class="font-bold">${gap.from}</span> ← <span class="font-bold">${gap.to}</span>
                            </div>
                            <div class="text-red-700 font-bold font-mono text-lg">${gap.duration} دقيقة</div>
                        </div>
                    `;
                });
                if(data.analysis.gaps.length === 0) gapsContainer.innerHTML = '<p class="text-gray-400 text-center">لا توجد فجوات تشغيلية</p>';

                // تحديث الرحلات
                const flightsContainer = document.getElementById('flights-list');
                flightsContainer.innerHTML = '';
                data.flights.forEach(f => {
                    flightsContainer.innerHTML += `
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 flex justify-between text-sm">
                            <span class="font-bold w-16">${f.time_str}</span>
                            <span class="w-20 text-blue-700 font-bold">${f.flight_no}</span>
                            <span class="flex-1 text-gray-600">${f.airline}</span>
                        </div>
                    `;
                });

            } catch (err) {
                console.error('Error fetching data:', err);
            }
        }

        // تشغيل الجلب عند تحميل الصفحة
        fetchData();
    </script>
</body>
</html>
