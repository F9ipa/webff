<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة عمليات KAIA - تصميم فيليكس</title>
    <style>
        body { background-color: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .nav button { background: #1a1f2b; color: white; border: 1px solid #30363d; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .nav button.active { background: #0056b3; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: #0d1117; }
        th, td { padding: 12px; border: 1px solid #30363d; text-align: center; }
        th { background: #161b22; color: #58a6ff; }
        .card-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: #1a1f2b; padding: 20px; border-radius: 8px; border-left: 4px solid #0056b3; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="show('arrivals')" id="btn-arrivals" class="active">رحلات الوصول</button>
        <button onclick="show('peak')" id="btn-peak">الذروة والفجوات</button>
        <button onclick="show('counters')" id="btn-counters">تحليل الكاونترات</button>
    </div>

    <div id="arrivals" class="section active">
        <table id="flightsTable">
            <thead><tr><th>الوقت</th><th>الخطوط</th><th>الرحلة</th><th>المصدر</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="peak" class="section">
        <div class="card-box">
            <div class="card">الفجوات المرصودة<h2 id="gapCount">0</h2></div>
        </div>
        <table id="gapsTable">
            <thead><tr><th>من</th><th>إلى</th><th>المدة (دقيقة)</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="counters" class="section">
        <div class="card-box">
            <div class="card">إجمالي الركاب<h2 id="pax">0</h2></div>
            <div class="card">احتياج الكاونترات<h2 id="cnt">0</h2></div>
        </div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/flights');
            const data = await res.json();
            
            // تعبئة الرحلات
            const tbody = document.querySelector('#flightsTable tbody');
            tbody.innerHTML = data.flights.map(f => `
                <tr>
                    <td>${f.EarlyOrDelayedDateTime.split('T')[1].substring(0,5)}</td>
                    <td>${f.Airline.Name}</td>
                    <td>${f.FlightNumber}</td>
                    <td>${f.Origin.Name}</td>
                </tr>
            `).join('');

            // تعبئة الفجوات
            document.getElementById('gapCount').innerText = data.analysis.gaps.length;
            document.querySelector('#gapsTable tbody').innerHTML = data.analysis.gaps.map(g => `
                <tr><td>${g.from}</td><td>${g.to}</td><td style="color:#ffa657">${g.duration}</td></tr>
            `).join('');

            // تعبئة الكاونترات
            document.getElementById('pax').innerText = data.analysis.total_pax;
            document.getElementById('cnt').innerText = data.analysis.counter_need;
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
