<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الرحلات - تصميم فيليكس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0b0e14; color: #ffffff; }
        .nav-btn { background-color: #1a202c; border: 1px solid #2d3748; padding: 6px 15px; border-radius: 5px; font-size: 12px; }
        .nav-btn.active { background-color: #2563eb; border-color: #3b82f6; }
        .table-header { border-bottom: 1px solid #2d3748; border-top: 1px solid #2d3748; color: #3b82f6; font-weight: bold; }
        .status-error { color: #ef4444; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body class="p-2">

    <div class="flex items-center justify-center gap-2 mb-4 bg-[#1a202c] p-2 rounded-md text-[10px]">
        <span>من وقت:</span>
        <input type="text" value="8:00 ص" class="bg-black border border-gray-600 px-1 rounded w-16 text-center">
        <span>إلى وقت:</span>
        <input type="text" value="11:59 م" class="bg-black border border-gray-600 px-1 rounded w-16 text-center">
        <button class="bg-green-600 px-3 py-1 rounded text-white">تحديث البيانات</button>
    </div>

    <div class="flex justify-center gap-1 mb-4">
        <button class="nav-btn" onclick="showTab('counters')">تحليل الاحتياج</button>
        <button class="nav-btn" onclick="showTab('gaps')">الذروة والفجوات</button>
        <button class="nav-btn active" onclick="showTab('flights')">رحلات الوصول</button>
    </div>

    <div id="main-content">
        <div class="grid grid-cols-4 text-center p-2 table-header text-xs">
            <div>الوقت المتوقع</div>
            <div>الخطوط</div>
            <div>الرحلة</div>
            <div>المصدر / الحالة</div>
        </div>
        
        <div id="data-container" class="mt-2 text-center text-xs">
            <div id="loading" class="py-10 text-gray-500">جاري تحميل البيانات...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/flights');
                const data = await response.json();
                const container = document.getElementById('data-container');
                container.innerHTML = '';

                if (data.flights && data.flights.length > 0) {
                    data.flights.forEach(f => {
                        container.innerHTML += `
                            <div class="grid grid-cols-4 py-3 border-b border-gray-800 items-center">
                                <div class="text-blue-400 font-mono">${f.time_str}</div>
                                <div>${f.airline}</div>
                                <div>${f.flight_no}</div>
                                <div class="text-gray-400">${f.origin || 'دولي'}</div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<p class="status-error">خطأ في الاتصال بالسيرفر أو لا توجد بيانات</p>`;
                }
            } catch (e) {
                document.getElementById('data-container').innerHTML = `<p class="status-error">خطأ في الاتصال بالسيرفر</p>`;
            }
        }

        function showTab(tab) {
            // منطق التبديل بين التبويبات يمكن توسيعه هنا
            console.log("Switching to: " + tab);
            loadData(); 
        }

        window.onload = loadData;
    </script>
</body>
</html>
